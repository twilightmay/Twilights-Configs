<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twilight's Configs</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%239d8ff0'/><stop offset='100%25' stop-color='%235b4eb4'/></linearGradient></defs><rect width='32' height='32' rx='9' fill='%23060810'/><rect width='32' height='32' rx='9' fill='url(%23g)' opacity='0.18'/><path d='M20.5 9.5a8 8 0 0 1-8.9 11.6A8 8 0 1 0 20.5 9.5z' fill='url(%23g)'/><circle cx='22' cy='10' r='1.2' fill='%23c4b5fd' opacity='0.9'/><circle cx='10' cy='22' r='0.8' fill='%23a78bfa' opacity='0.6'/><circle cx='25' cy='18' r='0.6' fill='%23e2d9ff' opacity='0.7'/></svg>">
<style>
  :root {
    --bg: #060810;
    --surface: rgba(255,255,255,0.04);
    --surface-hover: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.18);
    --text: #f0f0f5;
    --text-secondary: rgba(240,240,245,0.5);
    --text-muted: rgba(240,240,245,0.3);
    --accent: #7c6fdc;
    --accent-2: #a78bfa;
    --success: #34d399;
    --danger: #f87171;
    --radius: 16px;
    --radius-sm: 10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(ellipse 90% 55% at 50% -5%, rgba(124,111,220,0.08) 0%, transparent 55%),
      radial-gradient(ellipse 100% 60% at 50% 40%, rgba(20,14,48,0.30) 0%, transparent 80%);
    pointer-events: none;
    z-index: 0;
  }

  /* ===== SUNBEAMS ===== */
  #sunbeams {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    overflow: hidden;
  }

  /* Each beam: rounded pill shape, heavily blurred, slow drift */
  .beam {
    position: absolute;
    pointer-events: none;
    border-radius: 9999px;
    will-change: opacity, transform;
  }

  /* ===== ATMOSPHERIC FOG OVERLAY ===== */
  #fog-overlay {
    position: fixed; inset: 0; z-index: 2; pointer-events: none;
    background: linear-gradient(to bottom, transparent 50%, rgba(6,8,16,0.80) 100%);
  }

  /* ===== PARTICLES ===== */
  #particles-canvas {
    position: fixed; inset: 0; z-index: 2; pointer-events: none;
  }

  /* ===== KEYFRAMES ===== */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes panelIn {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes gradientFlow {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  @keyframes selectorExit {
    to { opacity: 0; transform: scale(0.96); }
  }
  /* ===== GAME SELECTOR ===== */
  #game-selector {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }

  .sel-eyebrow {
    font-size: 11px; font-weight: 600; letter-spacing: .2em;
    text-transform: uppercase; color: var(--accent-2);
    margin-bottom: 14px;
    animation: fadeUp .6s ease forwards .1s; opacity: 0;
  }
  .sel-title {
    font-size: clamp(28px,5vw,48px); font-weight: 700;
    letter-spacing: -.03em; margin-bottom: 10px;
    background: linear-gradient(110deg,#fff 0%,#c4b5fd 35%,#7c6fdc 65%,#a78bfa 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    animation: fadeUp .6s ease forwards .2s; opacity: 0;
  }
  .sel-sub {
    font-size: 14px; color: var(--text-muted); margin-bottom: 52px;
    animation: fadeUp .6s ease forwards .3s; opacity: 0;
  }
  .sel-cards {
    display: flex; gap: 18px; flex-wrap: wrap; justify-content: center;
    animation: fadeUp .6s ease forwards .4s; opacity: 0;
  }

  .game-card {
    width: 185px; padding: 28px 18px 22px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    cursor: pointer;
    transition: all .3s cubic-bezier(.34,1.3,.64,1);
    position: relative; overflow: hidden; text-align: center;
  }
  .game-card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,.04) 0%, transparent 60%);
    pointer-events: none;
  }
  .game-card:hover { transform: translateY(-6px) scale(1.02); }
  .game-card.cs2:hover {
    border-color: rgba(245,166,35,.55);
    box-shadow: 0 24px 60px rgba(0,0,0,.4), 0 0 40px rgba(245,140,0,.1);
  }
  .game-card.fivem:hover {
    border-color: rgba(69,182,106,.55);
    box-shadow: 0 24px 60px rgba(0,0,0,.4), 0 0 40px rgba(60,180,80,.1);
  }
  .game-card.general:hover {
    border-color: rgba(124,111,220,.55);
    box-shadow: 0 24px 60px rgba(0,0,0,.4), 0 0 40px rgba(124,111,220,.1);
  }

  .game-card-icon { width: 68px; height: 68px; margin: 0 auto 16px; }
  .game-card-icon svg { width: 100%; height: 100%; }
  .game-card-name { font-size: 15px; font-weight: 700; letter-spacing: -.01em; margin-bottom: 6px; }
  .game-card-desc { font-size: 11.5px; color: var(--text-muted); line-height: 1.5; }

  .game-card-badge {
    position: absolute; top: 11px; right: 11px;
    font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
    padding: 3px 7px; border-radius: 5px;
  }
  .badge-monthly { background: rgba(245,166,35,.15); border: 1px solid rgba(245,166,35,.3); color: #f5a623; }
  .badge-latest  { background: rgba(69,182,106,.15); border: 1px solid rgba(69,182,106,.3); color: #45b66a; }

  /* ===== TOPBAR ===== */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100; height: 48px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
    background: rgba(6,8,16,0.75);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border-bottom: 1px solid var(--border);
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .topbar-credit {
    font-size: 11.5px; color: var(--text-muted);
    letter-spacing: .02em; display: flex; align-items: center; gap: 6px;
  }
  .topbar-credit a { color: var(--accent-2); text-decoration: none; transition: opacity .2s; }
  .topbar-credit a:hover { opacity: .75; }
  .topbar-credit-btn {
    background: none; border: none; padding: 0; cursor: pointer;
    color: var(--accent-2); font-size: inherit; font-family: inherit;
    font-weight: 600; transition: opacity .2s; letter-spacing: .01em;
  }
  .topbar-credit-btn:hover { opacity: .75; }

  .topbar-game-pill {
    display: flex; align-items: center; gap: 5px;
    padding: 3px 10px 3px 6px;
    border-radius: 20px;
    background: var(--surface); border: 1px solid var(--border);
    font-size: 11px; font-weight: 600; color: var(--text-secondary);
    cursor: pointer; transition: all .2s; letter-spacing: .01em;
  }
  .topbar-game-pill:hover { border-color: var(--border-hover); color: var(--text); }
  .topbar-game-pill-icon { width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; }
  .topbar-game-pill-icon svg { width: 100%; height: 100%; }

  .topbar-links { display: flex; align-items: center; gap: 6px; }
  .topbar-link {
    display: flex; align-items: center; justify-content: center;
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text-secondary); text-decoration: none;
    transition: all .2s; cursor: pointer;
  }
  .topbar-link:hover { background: var(--surface-hover); border-color: var(--border-hover); color: var(--text); }
  .topbar-link svg { width: 16px; height: 16px; }

  /* ===== MAIN ===== */
  .main { position: relative; z-index: 3; padding-top: 48px; min-height: 100vh; }

  /* ===== HERO ===== */
  .hero { text-align: center; padding: 64px 24px 40px; }
  .hero-eyebrow {
    font-size: 11px; font-weight: 600; letter-spacing: .18em; text-transform: uppercase;
    color: var(--accent-2); margin-bottom: 16px;
    opacity: 0; animation: fadeUp .6s ease forwards .1s;
  }
  .hero-title {
    font-size: clamp(36px,6vw,64px); font-weight: 700;
    letter-spacing: -.03em; line-height: 1.05; margin-bottom: 16px;
    opacity: 0;
    animation: fadeUp .6s ease forwards .2s, gradientFlow 6s ease-in-out infinite 1s;
    background: linear-gradient(110deg,#fff 0%,#c4b5fd 18%,#7c6fdc 34%,#a78bfa 50%,#e2d9ff 66%,#9b8be0 82%,#fff 100%);
    background-size: 300% 100%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .hero-sub {
    font-size: 15px; color: var(--text-secondary);
    max-width: 460px; margin: 0 auto 40px; line-height: 1.6;
    opacity: 0; animation: fadeUp .6s ease forwards .3s;
  }

  /* ===== TABS ===== */
  .tab-nav {
    display: flex; justify-content: center; gap: 4px;
    padding: 0 24px; margin-bottom: 40px; flex-wrap: wrap;
    opacity: 0; animation: fadeUp .6s ease forwards .4s;
  }
  .tab-btn {
    position: relative;
    padding: 9px 20px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-secondary); font-size: 13.5px; font-weight: 500;
    cursor: pointer; transition: all .25s; letter-spacing: .01em;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }
  .tab-btn:hover { background: var(--surface-hover); border-color: var(--border-hover); color: var(--text); }
  .tab-btn.active { background: rgba(124,111,220,.18); border-color: rgba(124,111,220,.45); color: #e2d9ff; }
  .tab-btn.active::before {
    content: ''; position: absolute; inset: -1px; border-radius: 11px;
    background: linear-gradient(135deg,rgba(124,111,220,.5),rgba(91,78,180,.2)); z-index: -1;
  }
  .tab-btn.tab-btn-support { background: rgba(255,180,0,.07); border-color: rgba(255,180,0,.18); color: rgba(255,210,80,.7); }
  .tab-btn.tab-btn-support:hover { background: rgba(255,180,0,.12); border-color: rgba(255,210,80,.35); color: rgba(255,220,100,.95); }
  .tab-btn.tab-btn-support.active { background: rgba(255,180,0,.15); border-color: rgba(255,200,60,.5); color: #ffd460; }

  /* ===== TAB PANELS ===== */
  .tab-panel {
    display: none; opacity: 0; transform: translateY(10px);
    padding: 0 20px 80px; max-width: 1100px; margin: 0 auto;
  }
  .tab-panel.active { display: block; animation: panelIn .4s ease forwards; }

  /* stagger children */
  .tab-panel.active .sc {
    opacity: 0; animation: fadeUp .45s ease forwards;
  }
  .tab-panel.active .sc:nth-child(1){animation-delay:.05s}
  .tab-panel.active .sc:nth-child(2){animation-delay:.12s}
  .tab-panel.active .sc:nth-child(3){animation-delay:.19s}
  .tab-panel.active .sc:nth-child(4){animation-delay:.26s}
  .tab-panel.active .sc:nth-child(5){animation-delay:.33s}
  .tab-panel.active .sc:nth-child(6){animation-delay:.40s}
  .tab-panel.active .sc:nth-child(7){animation-delay:.47s}
  .tab-panel.active .sc:nth-child(8){animation-delay:.54s}

  /* ===== PACKS / CONFIGS GRID ===== */
  .packs-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(310px,1fr)); gap: 20px; }

  .pack-card {
    border-radius: var(--radius); border: 1px solid var(--border);
    background: var(--surface);
    backdrop-filter: blur(20px) saturate(160%); -webkit-backdrop-filter: blur(20px) saturate(160%);
    overflow: hidden;
    transition: border-color .3s, transform .3s, box-shadow .3s;
    position: relative;
  }
  .pack-card::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg,rgba(255,255,255,.03) 0%,transparent 60%);
    pointer-events: none;
  }
  .pack-card:hover {
    border-color: rgba(124,111,220,.35); transform: translateY(-3px);
    box-shadow: 0 20px 60px rgba(0,0,0,.4), 0 0 0 1px rgba(124,111,220,.1) inset;
  }

  /* fivem config type accent */
  .pack-card.type-legit:hover { border-color: rgba(52,211,153,.4); }
  .pack-card.type-semi:hover  { border-color: rgba(245,166,35,.4); }
  .pack-card.type-rage:hover  { border-color: rgba(248,113,113,.4); }

  .pack-slider { position: relative; height: 200px; overflow: hidden; background: rgba(0,0,0,.3); }
  .slider-track { display: flex; height: 100%; transition: transform .45s cubic-bezier(.4,0,.2,1); }
  .slide {
    flex-shrink: 0; width: 100%; height: 100%;
    background: linear-gradient(135deg,#0f0c1a,#1a1430);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .slide img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .slide-placeholder { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .slide-placeholder svg { width: 28px; height: 28px; opacity: .3; }
  .slide-placeholder span { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .1em; }

  .slider-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 30px; height: 30px; border-radius: 50%;
    background: rgba(0,0,0,.55); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,.12); color: white;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all .2s; z-index: 5; font-size: 14px;
  }
  .slider-btn:hover { background: rgba(124,111,220,.5); border-color: rgba(124,111,220,.6); }
  .slider-btn.prev { left: 8px; }
  .slider-btn.next { right: 8px; }

  .slider-dots { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; z-index: 5; }
  .slider-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,.3); cursor: pointer; transition: all .2s; }
  .slider-dot.active { background: rgba(167,139,250,.9); width: 14px; border-radius: 3px; }

  .pack-info { padding: 18px 20px 20px; }
  .pack-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .pack-name { font-size: 17px; font-weight: 600; letter-spacing: -.02em; line-height: 1.2; }
  .pack-month-badge {
    font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
    color: var(--accent-2); background: rgba(124,111,220,.12);
    border: 1px solid rgba(124,111,220,.25); border-radius: 6px; padding: 3px 8px; white-space: nowrap;
  }
  .pack-month-badge.legit-badge { color: #34d399; background: rgba(52,211,153,.1); border-color: rgba(52,211,153,.25); }
  .pack-month-badge.semi-badge  { color: #fbbf24; background: rgba(251,191,36,.1); border-color: rgba(251,191,36,.25); }
  .pack-month-badge.rage-badge  { color: #f87171; background: rgba(248,113,113,.1); border-color: rgba(248,113,113,.25); }

  .pack-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .tag {
    font-size: 11px; font-weight: 500; color: var(--text-secondary);
    background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08);
    border-radius: 6px; padding: 3px 9px; letter-spacing: .01em;
  }

  .pack-badges { display: flex; gap: 8px; flex-wrap: wrap; }
  .badge { display: flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 500; padding: 5px 10px; border-radius: 7px; border: 1px solid transparent; }
  .badge.yes { color: var(--success); background: rgba(52,211,153,.08); border-color: rgba(52,211,153,.2); }
  .badge.no  { color: var(--danger);  background: rgba(248,113,113,.08); border-color: rgba(248,113,113,.2); }
  .badge-icon { width: 14px; height: 14px; flex-shrink: 0; }

  /* ===== WHY TAB ===== */
  .why-hero { text-align: center; margin-bottom: 48px; padding-top: 8px; }
  .why-hero h2 {
    font-size: clamp(28px,5vw,44px); font-weight: 700; letter-spacing: -.03em; margin-bottom: 14px;
    background: linear-gradient(135deg,#fff,#a78bfa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .why-hero p { font-size: 15px; color: var(--text-secondary); max-width: 480px; margin: 0 auto; line-height: 1.7; }

  .why-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(270px,1fr)); gap: 16px; margin-bottom: 40px; }
  .why-card {
    padding: 24px; border-radius: var(--radius);
    border: 1px solid var(--border); background: var(--surface);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    transition: border-color .3s, transform .3s; position: relative; overflow: hidden;
  }
  .why-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg,transparent,rgba(167,139,250,.4),transparent);
  }
  .why-card:hover { border-color: rgba(124,111,220,.3); transform: translateY(-2px); }
  .why-icon {
    width: 40px; height: 40px; border-radius: 10px;
    background: rgba(124,111,220,.12); border: 1px solid rgba(124,111,220,.2);
    display: flex; align-items: center; justify-content: center; margin-bottom: 16px;
  }
  .why-icon svg { width: 20px; height: 20px; color: var(--accent-2); }
  .why-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 8px; letter-spacing: -.01em; }
  .why-card p { font-size: 13.5px; color: var(--text-secondary); line-height: 1.65; }

  .why-frosted-banner {
    border-radius: var(--radius); border: 1px solid rgba(124,111,220,.25);
    background: rgba(124,111,220,.07); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    padding: 28px 32px; display: flex; align-items: center; justify-content: space-between;
    gap: 24px; flex-wrap: wrap;
  }
  .why-frosted-banner .banner-text h3 { font-size: 17px; font-weight: 600; letter-spacing: -.02em; margin-bottom: 6px; }
  .why-frosted-banner .banner-text p { font-size: 13.5px; color: var(--text-secondary); line-height: 1.6; }
  .banner-link {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 11px 22px; border-radius: 10px;
    background: rgba(124,111,220,.2); border: 1px solid rgba(124,111,220,.4);
    color: #e2d9ff; font-size: 13.5px; font-weight: 500; text-decoration: none;
    transition: all .2s; white-space: nowrap;
  }
  .banner-link:hover { background: rgba(124,111,220,.3); border-color: rgba(124,111,220,.6); }

  /* fivem config type cards */
  .why-card.type-legit::before { background: linear-gradient(90deg,transparent,rgba(52,211,153,.3),transparent); }
  .why-card.type-semi::before  { background: linear-gradient(90deg,transparent,rgba(251,191,36,.3),transparent); }
  .why-card.type-rage::before  { background: linear-gradient(90deg,transparent,rgba(248,113,113,.3),transparent); }
  .why-card.type-legit:hover { border-color: rgba(52,211,153,.3); }
  .why-card.type-semi:hover  { border-color: rgba(251,191,36,.3); }
  .why-card.type-rage:hover  { border-color: rgba(248,113,113,.3); }
  .why-icon.legit { background: rgba(52,211,153,.1); border-color: rgba(52,211,153,.2); }
  .why-icon.legit svg { color: #34d399; }
  .why-icon.semi  { background: rgba(251,191,36,.1); border-color: rgba(251,191,36,.2); }
  .why-icon.semi svg { color: #fbbf24; }
  .why-icon.rage  { background: rgba(248,113,113,.1); border-color: rgba(248,113,113,.2); }
  .why-icon.rage svg { color: #f87171; }

  /* ===== SOCIAL TAB ===== */
  .social-container { max-width: 520px; margin: 0 auto; }
  .social-hero { text-align: center; margin-bottom: 36px; padding-top: 8px; }
  .social-hero h2 {
    font-size: clamp(26px,4vw,38px); font-weight: 700; letter-spacing: -.03em; margin-bottom: 10px;
    background: linear-gradient(135deg,#fff,#a78bfa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .social-hero p { font-size: 14px; color: var(--text-muted); }

  .social-cards { display: flex; flex-direction: column; gap: 14px; }
  .social-card {
    border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    padding: 22px 24px; display: flex; align-items: center; gap: 18px;
    transition: border-color .25s, transform .25s; position: relative; overflow: hidden;
  }
  .social-card::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg,rgba(255,255,255,.025) 0%,transparent 50%); pointer-events: none;
  }
  .social-card:hover { border-color: rgba(124,111,220,.3); transform: translateY(-2px); }

  .social-logo { width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .social-logo.discord-logo  { background: rgba(88,101,242,.15); border: 1px solid rgba(88,101,242,.25); }
  .social-logo.guns-logo     { background: rgba(239, 60, 255, 0.1);  border: 1px solid rgba(197, 22, 255, 0.2); }
  .social-logo.github-logo   { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); }
  .social-logo.server-logo   { background: rgba(88,101,242,.12); border: 1px solid rgba(88,101,242,.22); }
  .social-logo svg { width: 24px; height: 24px; }

  .social-info { flex: 1; min-width: 0; }
  .social-platform { font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
  .social-name { font-size: 16px; font-weight: 600; letter-spacing: -.01em; color: var(--text); }
  .social-card-note { font-size: 11.5px; color: var(--text-muted); margin-top: 3px; line-height: 1.4; }

  .social-actions { display: flex; gap: 8px; }
  .copy-btn, .visit-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: 8px; font-size: 12.5px; font-weight: 500;
    cursor: pointer; transition: all .2s;
    border: 1px solid var(--border); background: var(--surface); color: var(--text-secondary);
    text-decoration: none; letter-spacing: .01em; white-space: nowrap;
  }
  .copy-btn:hover, .visit-btn:hover { background: var(--surface-hover); border-color: var(--border-hover); color: var(--text); }
  .copy-btn svg, .visit-btn svg { width: 12px; height: 12px; }
  .copy-btn.copied { color: var(--success); border-color: rgba(52,211,153,.35); background: rgba(52,211,153,.06); }

  /* ===== SUPPORT TAB ===== */
  .support-container { max-width: 560px; margin: 0 auto; }
  .support-hero { text-align: center; margin-bottom: 36px; padding-top: 8px; }
  .support-hero h2 {
    font-size: clamp(26px,4vw,38px); font-weight: 700; letter-spacing: -.03em; margin-bottom: 10px;
    background: linear-gradient(135deg,#ffd460,#ffaa00);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .support-hero p { font-size: 14px; color: var(--text-muted); line-height: 1.65; }

  /* ===== SUPPORT ACTION CARDS ===== */
  .support-action-card {
    border-radius: var(--radius); overflow: hidden;
    padding: 24px 26px; margin-bottom: 18px;
    display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
    position: relative; transition: transform .25s, border-color .25s;
  }
  .support-action-card:hover { transform: translateY(-2px); }
  .yt-card   { border: 1px solid rgba(255,0,0,0.22);   background: rgba(255,0,0,0.05); }
  .yt-card:hover   { border-color: rgba(255,0,0,0.42); }
  .disc-card { border: 1px solid rgba(88,101,242,0.22); background: rgba(88,101,242,0.05); }
  .disc-card:hover { border-color: rgba(88,101,242,0.42); }

  /* top highlight line */
  .yt-card::before   { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(255,60,60,0.5),transparent); }
  .disc-card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(88,101,242,0.5),transparent); }

  .support-action-icon {
    width: 52px; height: 52px; border-radius: 14px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .yt-icon   { background: rgba(255,0,0,0.12);    border: 1px solid rgba(255,0,0,0.25); }
  .disc-icon { background: rgba(88,101,242,0.12); border: 1px solid rgba(88,101,242,0.28); }

  .support-action-info { flex: 1; min-width: 160px; }
  .support-action-label { font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; margin-bottom: 3px; }
  .yt-card   .support-action-label { color: rgba(255,80,80,0.7); }
  .disc-card .support-action-label { color: rgba(120,135,255,0.7); }
  .support-action-name { font-size: 16px; font-weight: 700; letter-spacing: -.01em; color: var(--text); margin-bottom: 4px; }
  .support-action-desc { font-size: 12px; color: var(--text-muted); line-height: 1.55; }

  .support-action-btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 10px 20px; border-radius: 10px;
    font-size: 13px; font-weight: 600; letter-spacing: .01em;
    text-decoration: none; white-space: nowrap; transition: all .2s;
  }
  .yt-btn   { border: 1px solid rgba(255,0,0,0.35);    background: rgba(255,0,0,0.12);    color: #ff7070; }
  .yt-btn:hover   { background: rgba(255,0,0,0.22);    border-color: rgba(255,0,0,0.55);   color: #ffaaaa; }
  .disc-btn { border: 1px solid rgba(88,101,242,0.35); background: rgba(88,101,242,0.12); color: #a0aaff; }
  .disc-btn:hover { background: rgba(88,101,242,0.22); border-color: rgba(88,101,242,0.55); color: #c0c8ff; }
  .support-action-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

  .referral-card {
    border-radius: var(--radius); border: 1px solid rgba(255,180,0,.2);
    background: rgba(255,160,0,.05); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    padding: 28px 28px 26px; position: relative; overflow: hidden; margin-bottom: 20px;
  }
  .referral-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg,transparent,rgba(255,200,60,.5),transparent);
  }
  .referral-card::after {
    content: ''; position: absolute; top: -60px; right: -60px;
    width: 180px; height: 180px; border-radius: 50%;
    background: radial-gradient(circle,rgba(255,180,0,.07) 0%,transparent 70%); pointer-events: none;
  }
  .referral-platform-row { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .referral-platform-icon {
    width: 42px; height: 42px; border-radius: 11px;
    background: rgba(255,160,0,.1); border: 1px solid rgba(255,180,0,.2);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .referral-platform-icon svg { width: 22px; height: 22px; }
  .referral-platform-label { font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,200,80,.6); margin-bottom: 2px; }
  .referral-platform-name { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -.01em; }
  .referral-code-box {
    display: flex; align-items: center; gap: 12px;
    background: rgba(0,0,0,.3); border: 1px solid rgba(255,180,0,.15);
    border-radius: 10px; padding: 14px 16px; margin-bottom: 14px;
  }
  .referral-code-display { flex: 1; min-width: 0; }
  .referral-code-label { font-size: 10px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
  .referral-code-value { font-size: 20px; font-weight: 700; letter-spacing: .06em; color: #ffd460; }
  .referral-copy-btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 9px 16px; border-radius: 8px; font-size: 12.5px; font-weight: 600;
    cursor: pointer; transition: all .2s;
    border: 1px solid rgba(255,180,0,.3); background: rgba(255,160,0,.1);
    color: #ffd460; white-space: nowrap; flex-shrink: 0; letter-spacing: .02em;
  }
  .referral-copy-btn:hover { background: rgba(255,160,0,.18); border-color: rgba(255,200,60,.5); }
  .referral-copy-btn.copied { color: var(--success); border-color: rgba(52,211,153,.35); background: rgba(52,211,153,.08); }
  .referral-copy-btn svg { width: 13px; height: 13px; }
  .referral-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
  .referral-desc a { color: rgba(255,200,80,.85); text-decoration: none; transition: opacity .2s; }
  .referral-desc a:hover { opacity: .7; }

  .support-note {
    border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    padding: 18px 22px; font-size: 13px; color: var(--text-secondary); line-height: 1.65; text-align: center;
  }

  /* ===== DISCORD MODAL ===== */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 500;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,.55);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    opacity: 0; pointer-events: none; transition: opacity .25s ease;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal-box {
    background: rgba(14,12,28,.95);
    border: 1px solid rgba(124,111,220,.3); border-radius: 20px;
    padding: 32px 28px 28px; width: 340px; max-width: calc(100vw - 40px);
    position: relative;
    transform: translateY(16px) scale(0.97);
    transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .25s ease;
    opacity: 0;
    box-shadow: 0 40px 100px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.04) inset;
  }
  .modal-overlay.open .modal-box { transform: translateY(0) scale(1); opacity: 1; }
  .modal-close {
    position: absolute; top: 14px; right: 14px;
    width: 28px; height: 28px; border-radius: 8px;
    background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08);
    color: var(--text-muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 16px;
    transition: all .2s;
  }
  .modal-close:hover { background: rgba(255,255,255,.1); color: var(--text); }
  .modal-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .modal-discord-icon { width: 40px; height: 40px; border-radius: 10px; background: rgba(88,101,242,.15); border: 1px solid rgba(88,101,242,.3); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .modal-discord-icon svg { width: 22px; height: 22px; }
  .modal-title { font-size: 16px; font-weight: 600; letter-spacing: -.01em; }
  .modal-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .modal-options { display: flex; flex-direction: column; gap: 10px; }
  .modal-option {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px; border-radius: 12px;
    border: 1px solid var(--border); background: var(--surface);
    text-decoration: none; color: var(--text);
    transition: all .2s; cursor: pointer;
  }
  .modal-option:hover { background: var(--surface-hover); border-color: rgba(124,111,220,.35); transform: translateY(-1px); }
  .modal-option-icon { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .modal-option-icon.dm-icon     { background: rgba(88,101,242,.12); border: 1px solid rgba(88,101,242,.2); }
  .modal-option-icon.server-icon { background: rgba(124,111,220,.12); border: 1px solid rgba(124,111,220,.2); }
  .modal-option-icon svg { width: 18px; height: 18px; }
  .modal-option-text strong { display: block; font-size: 13.5px; font-weight: 600; margin-bottom: 2px; }
  .modal-option-text span { font-size: 11.5px; color: var(--text-muted); }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 640px) {
    .packs-grid { grid-template-columns: 1fr; }
    .topbar-credit span.hide-sm { display: none; }
    .social-card { flex-wrap: wrap; }
    .why-frosted-banner { flex-direction: column; text-align: center; }
    .tab-btn { padding: 8px 14px; font-size: 12.5px; }
  }

  /* ===== GAME SWITCHER DROPDOWN ===== */
  .topbar-game-pill {
    display: flex; align-items: center; gap: 5px;
    padding: 3px 10px 3px 6px; border-radius: 20px;
    background: var(--surface); border: 1px solid var(--border);
    font-size: 11px; font-weight: 600; color: var(--text-secondary);
    cursor: pointer; transition: all .2s; letter-spacing: .01em;
    white-space: nowrap;
  }
  .topbar-game-pill:hover { border-color: var(--border-hover); color: var(--text); }
  .tgpi { width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .tgpi svg { width: 100%; height: 100%; }

  .game-dd-item {
    display: flex; align-items: center; gap: 10px;
    width: 100%; padding: 11px 16px;
    background: transparent; border: none;
    color: var(--text-secondary); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all .15s;
    white-space: nowrap; text-align: left;
  }
  .game-dd-item:hover { background: rgba(255,255,255,0.06); color: var(--text); }
  .game-dd-item.active { color: var(--text); background: rgba(124,111,220,0.1); }
  .game-dd-item + .game-dd-item { border-top: 1px solid rgba(255,255,255,0.05); }

  /* ===== MEDIA SLIDER ENHANCEMENTS ===== */
  .slide-ph { cursor: default; }

  /* Video thumbnail slide */  .slide-video { cursor: pointer; background: #0a0810; }
  .video-thumb-wrap {
    position: relative; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .video-thumb {
    width: 100%; height: 100%; object-fit: cover;
    filter: brightness(0.6);
    transition: filter .3s;
  }
  .video-thumb-wrap:hover .video-thumb { filter: brightness(0.75); }
  .video-play-btn {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .video-play-btn svg {
    width: 52px; height: 52px;
    background: rgba(0,0,0,0.65);
    border-radius: 50%; padding: 12px;
    border: 2px solid rgba(255,255,255,0.3);
    transition: transform .2s, background .2s;
    filter: drop-shadow(0 4px 16px rgba(0,0,0,0.5));
  }
  .video-thumb-wrap:hover .video-play-btn svg {
    transform: scale(1.08);
    background: rgba(255,0,0,0.7);
    border-color: rgba(255,255,255,0.5);
  }
  .video-label {
    position: absolute; bottom: 10px; left: 50%;
    transform: translateX(-50%);
    font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    background: rgba(0,0,0,0.5); padding: 3px 10px; border-radius: 20px;
    backdrop-filter: blur(4px); pointer-events: none;
  }

  /* Video dot */
  .slider-dot.video-dot {
    width: 18px; height: 14px; border-radius: 4px;
    background: rgba(255,60,60,0.4);
    display: flex; align-items: center; justify-content: center;
  }
  .slider-dot.video-dot.active { background: rgba(255,60,60,0.85); }
  .slider-dot.video-dot svg { display: block; }

  /* Video embed */
  .video-embed-wrap { width: 100%; height: 100%; background: #000; }
  .video-embed-wrap iframe { width: 100%; height: 100%; border: 0; }

  /* ===== RATE CTA ===== */
  .rate-cta {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 16px;
    border-top: 1px solid rgba(88,101,242,0.12);
    background: rgba(88,101,242,0.04);
    color: rgba(167,139,250,0.7);
    font-size: 12px; font-weight: 500; letter-spacing: .01em;
    text-decoration: none;
    transition: all .2s;
  }
  .rate-cta:hover {
    background: rgba(88,101,242,0.1);
    color: rgba(167,139,250,1);
    border-top-color: rgba(88,101,242,0.25);
  }
  .rate-cta svg:first-child { width: 16px; height: 16px; flex-shrink: 0; }

  /* ===== DOWNLOAD BUTTON ===== */
  .pack-download {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px;
    border-top: 1px solid rgba(124,111,220,0.12);
    background: rgba(124,111,220,0.04);
    color: rgba(167,139,250,0.8);
    font-size: 12px; font-weight: 600; letter-spacing: .02em;
    text-decoration: none; transition: all .2s; cursor: pointer;
    border: none; width: 100%; text-align: left;
  }
  .pack-download:hover {
    background: rgba(124,111,220,0.13);
    color: #c4b5fd;
    border-top-color: rgba(124,111,220,0.28);
  }
  .pack-download svg { width: 14px; height: 14px; flex-shrink: 0; }
  .pack-download .dl-label { flex: 1; }
  .pack-download .dl-filename {
    font-size: 10px; font-weight: 500; letter-spacing: .04em;
    color: rgba(167,139,250,0.45); white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; max-width: 140px;
  }
  .pack-download.dl-success { color: var(--success); border-top-color: rgba(52,211,153,0.25); background: rgba(52,211,153,0.06); }

  /* ===== BURGER MENU ===== */
  .burger-menu-overlay {
    position: fixed; inset: 0; z-index: 400;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    opacity: 0; pointer-events: none; transition: opacity .3s ease;
  }
  .burger-menu-overlay.open { opacity: 1; pointer-events: all; }

  .burger-panel {
    position: fixed; top: 12px; right: 12px; bottom: 12px; z-index: 410;
    width: 280px; max-width: calc(100vw - 24px);
    border-radius: 24px;
    background: linear-gradient(160deg,
      rgba(18,14,40,0.98) 0%,
      rgba(12,9,28,0.99) 50%,
      rgba(16,11,36,0.98) 100%);
    border: 1px solid rgba(124,111,220,0.20);
    backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px);
    transform: translateX(calc(100% + 20px));
    transition: transform .35s cubic-bezier(.34,1.2,.64,1);
    display: flex; flex-direction: column;
    box-shadow:
      -8px 0 60px rgba(0,0,0,0.6),
      0 0 0 1px rgba(255,255,255,0.04) inset,
      0 0 80px rgba(124,111,220,0.08);
    overflow: hidden;
  }
  .burger-menu-overlay.open .burger-panel { transform: translateX(0); }

  /* Top gradient accent bar */
  .burger-panel::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(124,111,220,0.6) 30%,
      rgba(167,139,250,0.9) 50%,
      rgba(124,111,220,0.6) 70%,
      transparent 100%);
    border-radius: 24px 24px 0 0;
  }

  /* Profile header */
  .burger-profile {
    display: flex; align-items: center; gap: 14px;
    padding: 22px 20px 18px;
    position: relative;
  }
  .burger-avatar {
    width: 48px; height: 48px; border-radius: 14px; flex-shrink: 0;
    overflow: hidden;
    border: 1px solid rgba(124,111,220,0.35);
    box-shadow: 0 4px 16px rgba(124,111,220,0.25);
  }
  .burger-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .burger-profile-info { flex: 1; min-width: 0; }
  .burger-profile-name {
    font-size: 15px; font-weight: 700; letter-spacing: -.01em;
    background: linear-gradient(110deg, #fff 0%, #c4b5fd 50%, #a78bfa 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .burger-profile-tag {
    font-size: 11px; color: var(--text-muted); margin-top: 2px; letter-spacing: .02em;
  }
  .burger-close {
    position: absolute; top: 16px; right: 16px;
    width: 30px; height: 30px; border-radius: 10px;
    background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.09);
    color: var(--text-muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; transition: all .2s; flex-shrink: 0;
  }
  .burger-close:hover { background: rgba(255,255,255,.12); color: var(--text); border-color: rgba(255,255,255,.18); }

  /* Section label */
  .burger-section-label {
    font-size: 9.5px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase;
    color: rgba(167,139,250,0.45); padding: 4px 20px 8px;
  }

  /* Links container */
  .burger-links {
    display: flex; flex-direction: column;
    padding: 4px 12px; gap: 3px; flex: 1;
    overflow-y: auto;
  }
  .burger-links::-webkit-scrollbar { display: none; }

  .burger-link {
    display: flex; align-items: center; gap: 13px;
    padding: 11px 12px; border-radius: 14px;
    color: var(--text-secondary); text-decoration: none;
    font-size: 13.5px; font-weight: 500;
    transition: all .2s; cursor: pointer;
    border: 1px solid transparent;
    background: transparent; width: 100%; text-align: left;
    position: relative; overflow: hidden;
  }
  .burger-link::before {
    content: ''; position: absolute; inset: 0; border-radius: 14px;
    opacity: 0; transition: opacity .2s;
  }
  .burger-link:hover {
    color: var(--text);
    border-color: rgba(255,255,255,0.07);
    background: rgba(255,255,255,0.04);
    transform: translateX(2px);
  }

  /* Coloured icon containers per link type */
  .burger-link-icon {
    width: 36px; height: 36px; border-radius: 11px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: transform .2s;
  }
  .burger-link:hover .burger-link-icon { transform: scale(1.08); }
  .burger-link-icon svg, .burger-link-icon img { width: 20px; height: 20px; }

  /* Per-platform icon colours */

// ============================================================

var switcherOpen = false;

function toggleSwitcher() {
  switcherOpen = !switcherOpen;
  var dd = document.getElementById('game-dd');
  var arrow = document.getElementById('pill-arrow');
  if (!dd) return;
  if (switcherOpen) {
    dd.style.display = 'block';
    if (arrow) arrow.style.transform = 'rotate(180deg)';
    setTimeout(function() { dd.style.opacity = '1'; dd.style.transform = 'translateY(0)'; }, 10);
  } else {
    if (arrow) arrow.style.transform = '';
    dd.style.opacity = '0'; dd.style.transform = 'translateY(-8px)';
    setTimeout(function() { dd.style.display = 'none'; }, 200);
  }
}

function closeSwitcher() {
  if (!switcherOpen) return;
  switcherOpen = false;
  var dd    = document.getElementById('game-dd');
  var arrow = document.getElementById('pill-arrow');
  if (arrow) arrow.style.transform = '';
  if (dd) { dd.style.opacity = '0'; dd.style.transform = 'translateY(-8px)'; setTimeout(function(){ dd.style.display='none'; }, 200); }
}

function switchGame(game) {
  if (game === currentGame) { closeSwitcher(); return; }
  currentGame = game; currentTab = 'why'; sliderState = {};
  closeSwitcher();
  var root = document.getElementById('app-root');
  root.style.opacity = '0'; root.style.transition = 'opacity .25s ease';
  setTimeout(function() { renderApp(); root.style.opacity = '1'; }, 260);
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('#game-switcher')) closeSwitcher();
});

// ============================================================
// MEDIA SLIDER — images + optional YouTube embed tab
// ============================================================
function renderMediaSlider(pack, idx) {
  var images    = pack.images || [];
  var videoId   = pack.videoId || null;
  var hasVideo  = !!videoId;
  var hasImages = images.some(function(img) { return img !== null; });
  var hasAny    = hasVideo || hasImages;
  var total     = images.length + (hasVideo ? 1 : 0);

  // Build slides
  var slidesHtml = '';

  // Image slides
  images.forEach(function(imgSrc, s) {
    if (imgSrc) {
      // Real image
      slidesHtml += '<div class="slide">'
        + '<img src="' + imgSrc + '" alt="' + pack.name + ' screenshot ' + (s+1) + '" loading="lazy" onerror="this.parentElement.innerHTML=\'<div class=slide-placeholder><svg viewBox=\\\'0 0 24 24\\\' fill=\\\'none\\\' stroke=\\\'currentColor\\\' stroke-width=\\\'1.5\\\'><rect x=\\\'3\\\' y=\\\'3\\\' width=\\\'18\\\' height=\\\'18\\\' rx=\\\'2\\\'/></svg><span>Image not found</span></div>\'">'
        + '</div>';
    } else {
      // Placeholder with helpful label
      slidesHtml += '<div class="slide slide-ph">'
        + '<div class="slide-placeholder">'
        + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.3"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>'
        + '<span>Screenshot ' + (s+1) + '</span>'
        + '</div></div>';
    }
  });

  // YouTube slide (last slide if exists)
  if (hasVideo) {
    slidesHtml += '<div class="slide slide-video" data-video="' + videoId + '" data-idx="' + idx + '">'
      + '<div class="video-thumb-wrap" onclick="loadVideoEmbed(' + idx + ',\'' + videoId + '\')">'
      + '<img src="https://img.youtube.com/vi/' + videoId + '/mqdefault.jpg" alt="Video preview" class="video-thumb" onerror="this.style.display=\'none\'">'
      + '<div class="video-play-btn">'
      + '<svg viewBox="0 0 24 24" fill="white" width="32" height="32"><polygon points="5 3 19 12 5 21 5 3"/></svg>'
      + '</div>'
      + '<div class="video-label">Watch gameplay</div>'
      + '</div>'
      + '</div>';
  } else if (!hasImages) {
    // No media at all placeholder
    slidesHtml += '<div class="slide slide-ph">'
      + '<div class="slide-placeholder">'
      + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.3"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>'
      + '<span>No media yet</span>'
      + '</div></div>';
  }

  if (total <= 0) total = 1;

  // Navigation dots + arrows
  var nav = '';
  if (total > 1) {
    var dots = '';
    for (var d = 0; d < total; d++) {
      var isVidDot = hasVideo && d === total - 1;
      dots += '<div class="slider-dot' + (d===0?' active':'') + (isVidDot?' video-dot':'') + '" onclick="slideTo(' + idx + ',' + d + ')">'
        + (isVidDot ? '<svg viewBox="0 0 24 24" fill="currentColor" width="8" height="8"><polygon points="5 3 19 12 5 21 5 3"/></svg>' : '')
        + '</div>';
    }
    nav = '<button class="slider-btn prev" onclick="slideMove(' + idx + ',-1)">&#8249;</button>'
        + '<button class="slider-btn next" onclick="slideMove(' + idx + ',1)">&#8250;</button>'
        + '<div class="slider-dots" id="dots-' + idx + '">' + dots + '</div>';
  }

  return '<div class="slider-track" id="track-' + idx + '">' + slidesHtml + '</div>' + nav;
}

// Load YouTube iframe when play button clicked
function loadVideoEmbed(idx, videoId) {
  var track = document.getElementById('track-' + idx);
  if (!track) return;
  var slides = track.querySelectorAll('.slide');
  var pos = sliderState[idx] || 0;
  var slide = slides[pos];
  if (!slide) return;
  slide.innerHTML = '<div class="video-embed-wrap">'
    + '<iframe src="https://www.youtube.com/embed/' + videoId + '?autoplay=1&rel=0" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen style="width:100%;height:100%;border:0;"></iframe>'
    + '</div>';
}

// ============================================================
// SLIDER CONTROLS
// ============================================================
function slideTo(id, index) {
  var packs = getPacks();
  if (!packs[id]) return;
  // If switching away from a video slide, reset it to thumbnail
  var track = document.getElementById('track-' + id);
  var prevIdx = sliderState[id] || 0;
  var pack = packs[id];
  var totalSlides = (pack.images || []).length + (pack.videoId ? 1 : 0);
  var wasVideoSlide = pack.videoId && prevIdx === totalSlides - 1;
  if (wasVideoSlide && track) {
    var slides = track.querySelectorAll('.slide');
    var vidSlide = slides[prevIdx];
    if (vidSlide && vidSlide.querySelector('iframe')) {
      var vid = pack.videoId;
      vidSlide.innerHTML = '<div class="video-thumb-wrap" onclick="loadVideoEmbed(' + id + ',\'' + vid + '\')">'
        + '<img src="https://img.youtube.com/vi/' + vid + '/mqdefault.jpg" alt="Video" class="video-thumb" onerror="this.style.display=\'none\'">'
        + '<div class="video-play-btn"><svg viewBox="0 0 24 24" fill="white" width="32" height="32"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>'
        + '<div class="video-label">Watch gameplay</div></div>';
    }
  }
  sliderState[id] = index;
  if (track) track.style.transform = 'translateX(-' + (index * 100) + '%)';
  var dots = document.querySelectorAll('#dots-' + id + ' .slider-dot');
  dots.forEach(function(d, i){ d.classList.toggle('active', i === index); });
}

function slideMove(id, dir) {
  var packs = getPacks();
  if (!packs[id]) return;
  var pack  = packs[id];
  var total = (pack.images || []).length + (pack.videoId ? 1 : 0);
  if (total === 0) total = 1;
  var current = sliderState[id] || 0;
  slideTo(id, (current + dir + total) % total);
}

    '@keyframes dR{0%,100%{transform:translateX(0)}50%{transform:translateX(12px)}}' +
    '@keyframes dC{0%,100%{transform:translateX(0)}40%{transform:translateX(8px)}70%{transform:translateX(-6px)}}';

    [ 31, 44,  990, 390,  90, 'bP1', 45,  3.5, 'dR', 30,  7.5],
    [ 29, 50, 1180, 500, 115, 'bP2', 62, 10.8, 'dC', 40,  0.5],
    [ 33, 56, 1040, 420,  96, 'bP0', 52,  5.0, 'dL', 35,  4.0],
    [ 30, 62,  920, 330,  78, 'bP1', 43,  0.5, 'dR', 27,  6.0],
    [ 36, 68, 1120, 450, 102, 'bP2', 57,  7.0, 'dC', 33,  2.5],

    [ 31, 80, 1060, 400,  92, 'bP1', 50,  2.8, 'dR', 31,  1.0],
    [ 34, 86,  960, 340,  80, 'bP2', 44,  9.2, 'dL', 25,  7.0],
  ];

  beams.forEach(function(b) {
    var angle=b[0], lv=b[1], h=b[2], w=b[3], bl=b[4];
    var pa=b[5], pdur=b[6], pdelay=b[7], da=b[8], ddur=b[9], ddelay=b[10];

    // OUTER: positioned at screen location, animates drift (translateX only)
    var outer = document.createElement('div');
    outer.style.position   = 'absolute';
    outer.style.left       = lv + 'vw';
    outer.style.top        = '-' + Math.round(h * 0.15) + 'px';
    outer.style.width      = w + 'px';
    outer.style.height     = h + 'px';
    outer.style.pointerEvents = 'none';
    outer.style.animation  = da + ' ' + ddur + 's ease-in-out infinite ' + ddelay + 's';

    // INNER: handles rotation, gradient fill, blur, opacity pulse
    // Kept separate so rotation doesn't override drift
    var inner = document.createElement('div');
    inner.style.position        = 'absolute';
    inner.style.inset           = '0';
    inner.style.transformOrigin = 'top center';
    inner.style.transform       = 'rotate(' + angle + 'deg)';

    inner.style.opacity   = '0.10';

    outer.appendChild(inner);
    container.appendChild(outer);
  });
})();

// PARTICLES
// ============================================================
(function() {
  var canvas = document.getElementById('particles-canvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var particles = [];
  var W, H;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  var COLORS = ['rgba(124,111,220,', 'rgba(167,139,250,', 'rgba(91,78,180,', 'rgba(196,181,253,'];

  for (var i = 0; i < 55; i++) {
    particles.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: Math.random() * 1.8 + 0.4,
      vx: (Math.random() - 0.5) * 0.25,
      vy: (Math.random() - 0.5) * 0.25 - 0.08,
      alpha: Math.random() * 0.5 + 0.1,
      color: COLORS[Math.floor(Math.random() * COLORS.length)]
    });
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    for (var j = 0; j < particles.length; j++) {
      var p = particles[j];
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color + p.alpha + ')';
      ctx.fill();
      p.x += p.vx;
      p.y += p.vy;
      if (p.y < -4) { p.y = H + 4; p.x = Math.random() * W; }
      if (p.x < -4) p.x = W + 4;
      if (p.x > W + 4) p.x = -4;
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

function noDownloadYet(btn) {
  var orig = btn.innerHTML;
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;flex-shrink:0;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span class="dl-label">No file linked yet</span>';
  btn.classList.add('dl-success');
  btn.style.color = 'rgba(248,113,113,0.8)';
  btn.style.borderTopColor = 'rgba(248,113,113,0.2)';
  btn.style.background = 'rgba(248,113,113,0.05)';
  setTimeout(function() { btn.innerHTML = orig; btn.classList.remove('dl-success'); btn.style.color = ''; btn.style.borderTopColor = ''; btn.style.background = ''; }, 2000);
}

// SHOWCASE MODAL
// ============================================================
function openShowcaseModal(game) {
  var isF = (game || currentGame) === 'fivem';
  var title  = isF ? 'Lucid' : 'lunaR';
  var sub    = isF ? 'FiveM cheat by frostchanger.com' : 'CS2 skin changer by frostchanger.com';
  var icon   = isF ? FIVEM_IMG : CS2_IMG;
  var vidId  = isF ? showcaseVideos.fivem : showcaseVideos.cs2;
  var extSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>';
  var playSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px"><polygon points="5 3 19 12 5 21 5 3"/></svg>';

  document.getElementById('showcaseModalTitle').textContent = title;
  document.getElementById('showcaseModalSub').textContent = sub;
  document.getElementById('showcaseModalIcon').innerHTML = '<img src="' + icon + '" style="width:26px;height:26px;object-fit:contain;">';

  var opts = '';

  // Watch showcase option — links to YouTube or shows "coming soon"
  if (vidId) {
    opts += '<a class="showcase-modal-opt" href="https://www.youtube.com/watch?v=' + vidId + '" target="_blank" rel="noopener" onclick="closeShowcaseModal()">'
      + '<div class="showcase-modal-opt-icon" style="background:rgba(255,0,0,0.1);border:1px solid rgba(255,0,0,0.2);">' + playSvg + '</div>'
      + '<div class="showcase-modal-opt-text"><strong>Watch Showcase</strong><span>See it in action on YouTube</span></div>'
      + '</a>';
  } else {
    opts += '<div class="showcase-modal-opt" style="opacity:0.45;pointer-events:none;">'
      + '<div class="showcase-modal-opt-icon" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);">' + playSvg + '</div>'
      + '<div class="showcase-modal-opt-text"><strong>Watch Showcase</strong><span>Video coming soon</span></div>'
      + '</div>';
  }

  // Go to frostchanger
  opts += '<a class="showcase-modal-opt" href="https://frostchanger.com" target="_blank" rel="noopener" onclick="closeShowcaseModal()">'
    + '<div class="showcase-modal-opt-icon" style="background:rgba(124,111,220,0.1);border:1px solid rgba(124,111,220,0.22);"><img src="https://frostchanger.com/apple-touch-icon.png" style="width:20px;height:20px;object-fit:cover;border-radius:4px;"></div>'
    + '<div class="showcase-modal-opt-text"><strong>Get ' + title + '</strong><span>frostchanger.com</span></div>'
    + '</a>';



  document.getElementById('showcaseModalOptions').innerHTML = opts;
  document.getElementById('showcaseModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeShowcaseModal() {
  document.getElementById('showcaseModal').classList.remove('open');
  document.body.style.overflow = '';
}
function handleShowcaseOverlayClick(e) {
  if (e.target === document.getElementById('showcaseModal')) closeShowcaseModal();
}
